openapi: 3.0.3
info:
  title: Enterprise API Hub Demo
  description: A perfectly compliant Enterprise API spec designed to pass all Spectral rules.
  version: 1.0.0
  contact:
    name: API Governance Team
    email: governance@example.com
servers:
  - url: https://api.example.com/v1
    description: Production Server
paths:
  /health:
    get:
      tags:
        - System
      summary: Health Check
      description: Returns the health status of the API to prove the pipeline works.
      operationId: getHealthStatus
      responses:
        '200':
          description: Successful response confirming the API is up and running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "Healthy"